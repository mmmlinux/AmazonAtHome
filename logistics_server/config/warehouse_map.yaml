# bearing is the direction FROM 'from' TO 'to'.
# All edges are bidirectional for navigation.
edges:

  # ── Charger row (east-west, north wall) ──────────────────────────────────────
  - { from: charge_1,  to: charge_2,   bearing:  90, distance: 4.0 }
  - { from: charge_2,  to: charge_3,   bearing:  90, distance: 4.0 }
  - { from: charge_3,  to: charge_4,   bearing:  90, distance: 4.0 }

  # ── West spine (south from charge_2) ─────────────────────────────────────────
  - { from: charge_2,  to: spine_W1,   bearing: 180, distance: 8.0 }
  - { from: spine_W1,  to: spine_W2,   bearing: 180, distance: 8.0 }
  - { from: spine_W2,  to: spine_W3,   bearing: 180, distance: 8.0 }
  - { from: spine_W3,  to: spine_W4,   bearing: 180, distance: 8.0 }
  - { from: spine_W4,  to: spine_W5,   bearing: 180, distance: 8.0 }
  - { from: spine_W5,  to: spine_Wqa,  bearing: 180, distance: 6.0 }
  - { from: spine_Wqa, to: dock_1,     bearing: 180, distance: 6.0 }

  # ── East spine (south from charge_3) ─────────────────────────────────────────
  - { from: charge_3,  to: spine_E1,   bearing: 180, distance: 8.0 }
  - { from: spine_E1,  to: spine_E2,   bearing: 180, distance: 8.0 }
  - { from: spine_E2,  to: spine_E3,   bearing: 180, distance: 8.0 }
  - { from: spine_E3,  to: spine_E4,   bearing: 180, distance: 8.0 }
