  - { from: spine_E5,  to: spine_Eqa,  bearing: 180, distance: 6.0 }
  - { from: spine_Eqa, to: dock_2,     bearing: 180, distance: 6.0 }

  # ── East-west cross corridors (double-wide central artery) ───────────────────
  - { from: spine_W1,  to: spine_E1,   bearing:  90, distance: 4.0 }
  - { from: spine_W2,  to: spine_E2,   bearing:  90, distance: 4.0 }
  - { from: spine_W3,  to: spine_E3,   bearing:  90, distance: 4.0 }
