# Warehouse map — polar edge format
#
# bearing: compass degrees  (0 = North/up, 90 = East/right,
#                            180 = South/down, 270 = West/left)
# distance: meters
#
# Layout (top = north):
#
#  charge_1─charge_2 ════════════════════════ charge_3─charge_4
#                │      double-wide corridor        │
#  ·─·─·─·─·  aisle positions A1-A5 ─ spine_W1 ─ spine_E1 ─ aisle positions F1-F5 ─·─·─·─·─·
#      each position has 2 storage spots branching N and S (e.g. shelf_A11, shelf_A12)
#  ·─·─·─·─·  B1-B5 ─ spine_W2 ─ spine_E2 ─ G1-G5 ─·─·─·─·─·
#  ·─·─·─·─·  C1-C5 ─ spine_W3 ─ spine_E3 ─ H1-H5 ─·─·─·─·─·
#  ·─·─·─·─·  D1-D5 ─ spine_W4 ─ spine_E4 ─ I1-I5 ─·─·─·─·─·
#  ·─·─·─·─·  E1-E5 ─ spine_W5 ─ spine_E5 ─ J1-J5 ─·─·─·─·─·
#              qa_W(+qa_W1/qa_W2) ─spine_Wqa─spine_Eqa─ qa_E(+qa_E1/qa_E2)
#                              dock_1 ──── dock_2
#
# Storage naming: shelf_XYZ
#   X = aisle letter (A-J)
#   Y = position along aisle (1-5, 1 is nearest spine)
#   Z = side (1 = north, 2 = south)
#   e.g. shelf_A11 = aisle A, position 1, north side

