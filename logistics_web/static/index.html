<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warehouse Logistics</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      background: #181c27;
      border-bottom: 1px solid #2d3748;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.02em; }
    #conn-label { font-size: 0.75rem; color: #64748b; margin-left: auto; }

    .dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: #10b981; flex-shrink: 0;
      transition: background 0.3s;
    }
    .dot.off { background: #4b5563; }

    /* ── Main layout ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 300px 240px;
      overflow: hidden;
    }

    /* ── Map panel ── */
    #map-panel {
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #map-svg {
      width: 100%;
      height: 100%;
      max-height: calc(100vh - 58px - 40px);
      background: #181c27;
      border-radius: 10px;
      border: 1px solid #2d3748;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.6; }
    }
    .robot-dot.moving { animation: pulse 0.8s ease-in-out infinite; }

    /* ── Controls panel ── */
    #controls {
      background: #181c27;
      border-left: 1px solid #2d3748;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      overflow-y: auto;
    }

    .section-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #475569;
      margin-bottom: 8px;
    }

    .card {
      background: #1e2333;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 14px;
    }

    /* ── Robot status cards ── */
    .robot-card { margin-bottom: 10px; }
    .robot-card:last-child { margin-bottom: 0; }

    .robot-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .robot-swatch {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .robot-name  { font-size: 0.85rem; font-weight: 600; color: #f1f5f9; }
    .robot-loc   { font-size: 0.78rem; color: #94a3b8; margin-bottom: 2px; }
    .robot-detail {
      font-size: 0.75rem; color: #64748b;
      min-height: 1.6em; line-height: 1.4;
      margin-bottom: 6px;
    }

    .batt-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: #64748b;
      margin-bottom: 3px;
    }
    .batt-track {
      height: 4px; background: #2d3748;
      border-radius: 2px; overflow: hidden;
      margin-bottom: 8px;
    }
    .batt-fill {
      height: 100%; border-radius: 2px;
      transition: width 0.5s linear, background-color 0.5s;
    }

    .priority-badge {
      display: inline-block;
      font-size: 0.65rem; font-weight: 600; letter-spacing: 0.04em;
      padding: 1px 6px; border-radius: 3px;
      margin-bottom: 4px;
      text-transform: uppercase;
    }
    .priority-0 { background: #1e2333; color: #475569; }
    .priority-1 { background: #1e3a5f; color: #60a5fa; }
    .priority-2 { background: #1c3a2a; color: #34d399; }
    .priority-3 { background: #3b1f1f; color: #f87171; }

    /* queue badge */
    #queue-badge {
      font-size: 0.75rem; color: #94a3b8;
      min-height: 1.2em;
    }

    /* ── Task control ── */
    select {
      width: 100%;
      padding: 7px 10px;
      border-radius: 6px;
      border: 1px solid #374151;
      background: #111827;
      color: #e2e8f0;
      font-size: 0.85rem;
      margin-bottom: 10px;
      cursor: pointer;
    }
    select:focus { outline: none; border-color: #3b82f6; }

    .btn {
      display: block;
      width: 100%;
      padding: 9px 12px;
      border-radius: 6px;
      border: none;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
      transition: filter 0.15s, opacity 0.15s;
    }
    .btn:last-child { margin-bottom: 0; }
    .btn:hover:not(:disabled) { filter: brightness(1.15); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    #btn-pickup   { background: #1d4ed8; color: #fff; }
    #btn-delivery { background: #065f46; color: #fff; }

    /* legend */
    .legend-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.78rem; color: #94a3b8; margin-bottom: 5px;
    }
    .legend-row:last-child { margin-bottom: 0; }
    .legend-dot {
      width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0;
    }

    /* Clickable waypoint nodes */
    .slot-node { cursor: pointer; }
    .slot-node:hover circle { filter: brightness(1.3); }

    /* ── Test panel ── */
    #test-panel {
      background: #181c27;
      border-left: 1px solid #2d3748;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      overflow-y: auto;
    }
    #test-log {
      font-size: 0.72rem;
      color: #64748b;
      font-family: monospace;
      line-height: 1.6;
      min-height: 2em;
    }
  </style>
</head>
<body>

<header>
  <div class="dot off" id="conn-dot"></div>
  <h1>Warehouse Logistics</h1>
  <span id="conn-label">Connecting…</span>
</header>

<main>
  <!-- Map -->
  <div id="map-panel">
    <svg id="map-svg" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      <g id="edges-layer"></g>
      <g id="nodes-layer"></g>
      <g id="robots-layer"></g>
    </svg>
  </div>

  <!-- Controls -->
  <div id="controls">

    <div>
      <div class="section-label">Fleet Status</div>
      <div class="card" id="fleet-card">
        <div id="queue-badge"></div>
        <div id="robot-cards"></div>
      </div>
    </div>

    <div>
      <div class="section-label">Task Control</div>
      <div class="card">
        <label style="font-size:0.78rem; color:#64748b; display:block; margin-bottom:6px">
          Select storage slot
        </label>
        <select id="slot-select"><option value="">— loading slots —</option></select>
        <button class="btn" id="btn-pickup"   disabled>Pick Up from Slot</button>
        <button class="btn" id="btn-delivery" disabled>Put Box in Slot</button>
      </div>
    </div>

    <div>
      <div class="section-label">Legend</div>
      <div class="card">
        <div class="legend-row"><div class="legend-dot" style="background:#f59e0b"></div>Charging station</div>
        <div class="legend-row"><div class="legend-dot" style="background:#34d399"></div>Loading dock</div>
        <div class="legend-row"><div class="legend-dot" style="background:#f97316"></div>Unloading dock</div>
        <div class="legend-row"><div class="legend-dot" style="background:#60a5fa"></div>Storage shelf</div>
        <div class="legend-row"><div class="legend-dot" style="background:#a78bfa"></div>Quick access</div>
        <div class="legend-row"><div class="legend-dot" style="background:#374151"></div>Intersection</div>
        <div class="legend-row" style="margin-top:8px; border-top:1px solid #2d3748; padding-top:8px;">
          <div class="legend-dot" style="background:#60a5fa; border:2px solid #fff"></div>
          <span>Occupied slot <span style="color:#475569">(click to toggle)</span></span>
        </div>
      </div>
    </div>

  </div>

  <!-- Test panel -->
  <div id="test-panel">
    <div>
      <div class="section-label">Testing</div>
      <div class="card">
        <button class="btn" id="btn-populate" style="background:#4b21a8; color:#fff; margin-bottom:10px">
          Randomly Populate Shelves
        </button>
        <button class="btn" id="btn-clear-shelves" style="background:#1e2333; color:#94a3b8; border:1px solid #374151; margin-bottom:0">
          Clear All Shelves
        </button>
      </div>
    </div>
    <div>
      <div class="card">
        <button class="btn" id="btn-random-pickup" style="background:#1d4ed8; color:#fff; margin-bottom:0">
          Queue Random Pickup
        </button>
      </div>
    </div>
    <div>
      <div class="section-label">Task Queue</div>
      <div class="card">
        <div id="queue-list" style="font-size:0.75rem; font-family:monospace; line-height:1.8; color:#94a3b8;">
          <span style="color:#475569">empty</span>
        </div>
      </div>
    </div>
    <div>
      <div class="section-label">Log</div>
      <div class="card">
        <div id="test-log">—</div>
      </div>
    </div>
  </div>

</main>

<script>
// ── Constants ────────────────────────────────────────────────────────────────

const NODE_COLOR = {
  charging:         '#f59e0b',
  loading:          '#34d399',
  unloading:        '#f97316',
  loading_unloading:'#34d399',
  storage:          '#60a5fa',
  quick_access:     '#a78bfa',
  intersection:     '#374151',
};
const NODE_RADIUS    = { intersection: 4 };
const DEFAULT_RADIUS = 8;

// Robot colours — assigned in order of first appearance
const ROBOT_PALETTE = ['#ef4444', '#3b82f6', '#a855f7', '#f59e0b', '#10b981'];

// ── Runtime state ─────────────────────────────────────────────────────────────

let positions     = {};           // waypoint_id -> {x, y}
let robotMeta     = {};           // robot_id    -> {color, svgEl, cardEl}
let slotNodes     = {};           // waypoint_id -> {circleEl, dotEl} for trackable nodes
let storageSlotIds = [];          // IDs of storage-type waypoints only
let paletteIdx    = 0;

// ── SVG helper ────────────────────────────────────────────────────────────────

function svgEl(tag, attrs = {}) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

// ── Map rendering ─────────────────────────────────────────────────────────────

async function loadMap() {
  const map = await fetch('/map').then(r => r.json());

  for (const [id, info] of Object.entries(map.waypoints))
    positions[id] = { x: info.x, y: info.y };

  // Fit viewBox
  const pad = 60;
  const xs  = Object.values(positions).map(p => p.x);
  const ys  = Object.values(positions).map(p => p.y);
  const minX = Math.min(...xs) - pad, maxX = Math.max(...xs) + pad;
  const minY = Math.min(...ys) - pad, maxY = Math.max(...ys) + pad;
  document.getElementById('map-svg')
    .setAttribute('viewBox', `${minX} ${minY} ${maxX - minX} ${maxY - minY}`);

  const edgesG = document.getElementById('edges-layer');
  const nodesG = document.getElementById('nodes-layer');

  // Edges
  for (const edge of map.edges) {
    const pa = positions[edge.from], pb = positions[edge.to];
    if (!pa || !pb) continue;
    edgesG.appendChild(svgEl('line', {
      x1: pa.x, y1: pa.y, x2: pb.x, y2: pb.y,
      stroke: '#2d3748', 'stroke-width': 2, 'stroke-linecap': 'round',
    }));
  }

  // Nodes
  const storageTypes  = new Set(['storage', 'quick_access']);
  const trackableTypes = new Set(['storage', 'quick_access', 'loading', 'unloading', 'loading_unloading']);
  const slotSelect    = document.getElementById('slot-select');
  slotSelect.innerHTML = '';

  for (const [id, info] of Object.entries(map.waypoints)) {
    const pos  = positions[id];
    const r    = NODE_RADIUS[info.type] ?? DEFAULT_RADIUS;
    const isIntersection = info.type === 'intersection';
    const isTrackable    = trackableTypes.has(info.type);
    const g    = svgEl('g');
    if (isTrackable) g.classList.add('slot-node');

    let mainCircle = null;

    if (info.type === 'loading_unloading') {
      const [cx, cy] = [pos.x, pos.y];
      g.appendChild(svgEl('path', {
        d: `M ${cx},${cy - r} A ${r},${r} 0 0,0 ${cx},${cy + r} Z`,
        fill: '#34d399', stroke: 'none',
      }));
      g.appendChild(svgEl('path', {
        d: `M ${cx},${cy - r} A ${r},${r} 0 0,1 ${cx},${cy + r} Z`,
        fill: '#f97316', stroke: 'none',
      }));
      mainCircle = svgEl('circle', { cx, cy, r, fill: 'none', stroke: '#0f1117', 'stroke-width': 2 });
      g.appendChild(mainCircle);
      g.appendChild(svgEl('line', { x1: cx, y1: cy - r, x2: cx, y2: cy + r, stroke: '#0f1117', 'stroke-width': 1 }));
    } else {
      const color = NODE_COLOR[info.type] || '#6b7280';
      if (!isIntersection) {
        g.appendChild(svgEl('circle', { cx: pos.x, cy: pos.y, r: r + 3, fill: color, opacity: 0.15 }));
      }
      mainCircle = svgEl('circle', {
        cx: pos.x, cy: pos.y, r,
        fill: color, stroke: '#0f1117', 'stroke-width': 2,
      });
      g.appendChild(mainCircle);
    }

    // Occupancy indicator: small white dot in centre when occupied
    let occupancyDot = null;
    if (isTrackable) {
      occupancyDot = svgEl('circle', {
        cx: pos.x, cy: pos.y, r: Math.max(3, r * 0.28),
        fill: '#ffffff', opacity: 0, 'pointer-events': 'none',
      });
      g.appendChild(occupancyDot);
      slotNodes[id] = { mainCircle, occupancyDot };

      g.addEventListener('click', () => {
        const current = (slotNodes[id] && parseFloat(slotNodes[id].occupancyDot.getAttribute('opacity')) > 0.5);
        setSlotOccupancy(id, !current);
      });
    }

    if (!isIntersection) {
      const txt = svgEl('text', {
        x: pos.x, y: pos.y + r + 8,
        'text-anchor': 'middle', fill: '#94a3b8',
        'font-size': 8, 'font-family': 'monospace',
      });
      txt.textContent = id;
      g.appendChild(txt);
    }
    nodesG.appendChild(g);

    if (info.type === 'storage') {
      storageSlotIds.push(id);
    }

    if (storageTypes.has(info.type)) {
      const opt   = document.createElement('option');
      opt.value   = id;
      opt.textContent = `${id}  (${info.type.replace('_', ' ')})`;
      slotSelect.appendChild(opt);
    }
  }

  document.getElementById('btn-pickup').disabled   = false;
  document.getElementById('btn-delivery').disabled = false;
}

// ── Robot DOM management ──────────────────────────────────────────────────────

function ensureRobot(robotId) {
  if (robotMeta[robotId]) return robotMeta[robotId];

  const color = ROBOT_PALETTE[paletteIdx % ROBOT_PALETTE.length];
  paletteIdx++;

  // SVG circle
  const robotsLayer = document.getElementById('robots-layer');
  const el = svgEl('circle', {
    r: 8,
    fill: color, stroke: '#fff', 'stroke-width': 1.5,
    style: 'filter:url(#glow); transition: transform 0.28s linear;',
    transform: 'translate(-50,-50)',
  });
  el.classList.add('robot-dot');
  robotsLayer.appendChild(el);

  // Status card
  const label = robotId.replace('_', ' ').replace(/\b\w/g, c => c.toUpperCase());
  const card  = document.createElement('div');
  card.className = 'robot-card';
  card.id        = `card-${robotId}`;
  card.innerHTML = `
    <div class="robot-header">
      <div class="robot-swatch" style="background:${color}"></div>
      <div class="robot-name">${label}</div>
    </div>
    <div class="robot-loc"  id="loc-${robotId}">—</div>
    <div class="robot-detail" id="detail-${robotId}">—</div>
    <div><span class="priority-badge priority-0" id="pri-${robotId}">Idle</span></div>
    <div class="batt-row">
      <span>Battery</span><span id="bpct-${robotId}">—</span>
    </div>
    <div class="batt-track">
      <div class="batt-fill" id="bbar-${robotId}" style="width:100%"></div>
    </div>
  `;
  document.getElementById('robot-cards').appendChild(card);

  robotMeta[robotId] = { color, svgEl: el };
  return robotMeta[robotId];
}

// ── Rendering ─────────────────────────────────────────────────────────────────

const PRIORITY_LABELS = ['Idle', 'Empty transit', 'Loaded', 'Return to charge'];

function renderRobot(robotId, s) {
  const meta = ensureRobot(robotId);

  // Position on map
  const from = positions[s.current_waypoint];
  const to   = positions[s.target_waypoint];
  if (from) {
    let x, y;
    if (s.is_moving && to) {
      const t = Math.max(0, Math.min(1, s.travel_progress));
      x = from.x + (to.x - from.x) * t;
      y = from.y + (to.y - from.y) * t;
    } else {
      x = from.x; y = from.y;
    }
    meta.svgEl.style.transform = `translate(${x}px,${y}px)`;
    meta.svgEl.style.display = '';
  } else {
    meta.svgEl.style.display = 'none';
  }
  s.is_moving
    ? meta.svgEl.classList.add('moving')
    : meta.svgEl.classList.remove('moving');

  // Status card
  const locEl    = document.getElementById(`loc-${robotId}`);
  const detailEl = document.getElementById(`detail-${robotId}`);
  const priEl    = document.getElementById(`pri-${robotId}`);
  const bpctEl   = document.getElementById(`bpct-${robotId}`);
  const bbarEl   = document.getElementById(`bbar-${robotId}`);
  if (!locEl) return;

  locEl.textContent = !s.current_waypoint
    ? 'Locating…'
    : s.is_moving && s.target_waypoint
      ? `${s.current_waypoint}  →  ${s.target_waypoint}`
      : `At: ${s.current_waypoint}`;
  detailEl.textContent = s.task_detail ?? '';

  const pri = s.movement_priority ?? 0;
  priEl.textContent = PRIORITY_LABELS[pri] ?? `Priority ${pri}`;
  priEl.className   = `priority-badge priority-${Math.min(pri, 3)}`;

  const pct = s.battery_level ?? 100;
  bpctEl.textContent       = `${pct.toFixed(0)}%`;
  bbarEl.style.width       = `${pct}%`;
  bbarEl.style.backgroundColor =
    pct > 60 ? '#10b981' : pct > 20 ? '#f59e0b' : '#ef4444';
}

function updateSlots(slots) {
  for (const [id, occupied] of Object.entries(slots)) {
    const node = slotNodes[id];
    if (!node) continue;
    node.occupancyDot.setAttribute('opacity', occupied ? 0.9 : 0);
    node.mainCircle.setAttribute('stroke', occupied ? '#ffffff' : '#0f1117');
    node.mainCircle.setAttribute('stroke-width', occupied ? 3 : 2);
  }
}

function updateUI(data) {
  // Queue badge
  const qs  = data.queue_size ?? 0;
  document.getElementById('queue-badge').textContent =
    qs > 0 ? `${qs} task${qs === 1 ? '' : 's'} queued` : '';

  // Task queue list in test panel
  const items = data.queue_items ?? [];
  const qEl   = document.getElementById('queue-list');
  if (items.length === 0) {
    qEl.innerHTML = '<span style="color:#475569">empty</span>';
  } else {
    qEl.innerHTML = items.map((item, i) => {
      const colon = item.indexOf(':');
      const type  = item.slice(0, colon);
      const slot  = item.slice(colon + 1);
      const color = type === 'pickup' ? '#60a5fa' : '#34d399';
      return `<div>${i + 1}. <span style="color:${color}">${type}</span> ${slot}</div>`;
    }).join('');
  }

  // Per-robot
  for (const [robotId, s] of Object.entries(data.robots ?? {}))
    renderRobot(robotId, s);

  // Slot occupancy
  if (data.slots) updateSlots(data.slots);

  // Connection dot: green when connected
  document.getElementById('conn-dot').className = 'dot';
}

// ── WebSocket ────────────────────────────────────────────────────────────────

let ws, reconnTimer;

function connect() {
  ws = new WebSocket(`ws://${location.host}/ws`);

  ws.onopen = () => {
    document.getElementById('conn-dot').className = 'dot';
    document.getElementById('conn-label').textContent = 'Connected';
    clearTimeout(reconnTimer);
  };

  ws.onclose = () => {
    document.getElementById('conn-dot').className = 'dot off';
    document.getElementById('conn-label').textContent = 'Disconnected — retrying…';
    reconnTimer = setTimeout(connect, 2500);
  };

  ws.onmessage = ({ data }) => {
    updateUI(JSON.parse(data));
  };
}

// ── Slot occupancy toggle ─────────────────────────────────────────────────────

async function setSlotOccupancy(waypointId, occupied) {
  await fetch('/slot/set', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ waypoint_id: waypointId, occupied }),
  });
}

// ── Task buttons ──────────────────────────────────────────────────────────────

async function sendTask(type) {
  const slot = document.getElementById('slot-select').value;
  if (!slot) { alert('Please select a slot first.'); return; }
  await fetch(`/task/${type}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ slot }),
  });
}

document.getElementById('btn-pickup').addEventListener('click',   () => sendTask('pickup'));
document.getElementById('btn-delivery').addEventListener('click', () => sendTask('delivery'));

// ── Test panel ────────────────────────────────────────────────────────────────

function testLog(msg) {
  document.getElementById('test-log').textContent = msg;
}

document.getElementById('btn-populate').addEventListener('click', async () => {
  if (!storageSlotIds.length) { testLog('No shelves loaded yet.'); return; }
  let filled = 0;
  for (const id of storageSlotIds) {
    const occupied = Math.random() < 0.65;
    if (occupied) filled++;
    await setSlotOccupancy(id, occupied);
  }
  testLog(`Populated ${filled} / ${storageSlotIds.length} shelves.`);
});

document.getElementById('btn-clear-shelves').addEventListener('click', async () => {
  if (!storageSlotIds.length) { testLog('No shelves loaded yet.'); return; }
  for (const id of storageSlotIds)
    await setSlotOccupancy(id, false);
  testLog(`Cleared ${storageSlotIds.length} shelves.`);
});

document.getElementById('btn-random-pickup').addEventListener('click', async () => {
  const occupied = storageSlotIds.filter(
    id => slotNodes[id] && parseFloat(slotNodes[id].occupancyDot.getAttribute('opacity')) > 0.5
  );
  if (!occupied.length) { testLog('No occupied shelves to pick from.'); return; }
  const slot = occupied[Math.floor(Math.random() * occupied.length)];
  await fetch('/task/pickup', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ slot }),
  });
  testLog(`Queued pickup: ${slot}`);
});

// ── Boot ─────────────────────────────────────────────────────────────────────

loadMap().then(connect);
</script>
